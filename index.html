<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wallpaper Hub</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0f12;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1. Intro Animation / Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1s ease-in-out forwards;
            animation-delay: 2.5s; /* Animation 2.5 seconds tak chalegi */
        }

        .splash-logo {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: scaleUp 1.5s ease-in-out infinite alternate;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 5px rgba(255,0,127,0.3)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(127,0,255,0.8)); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* 2. Main Website Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Upload Button */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px dashed #4facfe;
            color: #4facfe;
            background-color: transparent;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            background: #4facfe;
            color: #fff;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Gallery Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery-title {
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-left: 4px solid #ff007f;
            padding-left: 10px;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Wallpaper Card */
        .wallpaper-card {
            background: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .wallpaper-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .wallpaper-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background: #252533;
        }

        .card-body {
            padding: 20px;
        }

        .download-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .quality-select {
            flex: 1;
            background: #252533;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .btn-download {
            background: linear-gradient(45deg, #00g2fe, #ff007f);
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        /* Placeholder/No image text */
        .no-wallpaper {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">WALLPAPER HUB</div>
    </div>

    <header>
        <div class="logo">WpHub.ai</div>
        <div class="upload-btn-wrapper">
            <button class="btn-upload">📤 Upload Wallpaper</button>
            <input type="file" id="imageLoader" accept="image/*" />
        </div>
    </header>

    <div class="container">
        <h2 class="gallery-title">Your Studio Gallery</h2>
        <div class="wallpaper-grid" id="wallpaperGrid">
            <div class="no-wallpaper" id="noWallpaperText">Koi wallpaper upload nahi kiya gaya hai. Kripya upar diye button se upload karein!</div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const wallpaperGrid = document.getElementById('wallpaperGrid');
        const noWallpaperText = document.getElementById('noWallpaperText');

        // Page load hote hi check karein ki kya pehle se koi image saved hai?
        document.addEventListener("DOMContentLoaded", () => {
            const savedImage = localStorage.getItem("userWallpaper");
            if (savedImage) {
                renderWallpaper(savedImage);
            }
        });

        // Image upload handle karne ke liye
        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgDataUrl = event.target.result;
                
                // 1. LocalStorage me save karein (Persistence ke liye)
                try {
                    localStorage.setItem("userWallpaper", imgDataUrl);
                    // 2. UI me show karein
                    renderWallpaper(imgDataUrl);
                } catch (error) {
                    alert("Image ka size bahut bada hai! LocalStorage ki limit cross ho gayi hai. Kripya thodi choti image upload karein.");
                }
            }
            if(e.target.files[0]){
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        // Card Render karne ka function
        function renderWallpaper(imgSrc) {
            // Purana content ya placeholder text hatayein
            wallpaperGrid.innerHTML = "";

            const card = document.createElement('div');
            card.className = 'wallpaper-card';

            card.innerHTML = `
                <img src="${imgSrc}" class="wallpaper-img" id="currentWallpaper" alt="Wallpaper">
                <div class="card-body">
                    <h3>My Custom Wallpaper</h3>
                    <p style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">Choose quality to save in gallery</p>
                    <div class="download-controls">
                        <select class="quality-select" id="qualitySelect">
                            <option value="high">High Quality (Original)</option>
                            <option value="medium">Medium Quality (Optimized)</option>
                            <option value="low">Low Quality (Data Saver)</option>
                        </select>
                        <button class="btn-download" onclick="triggerDownload()">Download</button>
                    </div>
                </div>
            `;
            wallpaperGrid.appendChild(card);
        }

        // Multi-Quality Download Logic using HTML5 Canvas
        function triggerDownload() {
            const imgElement = document.getElementById('currentWallpaper');
            const quality = document.getElementById('qualitySelect').value;

            if (!imgElement) return;

            const img = new Image();
            img.src = imgElement.src;

            img.onload = function() {
                // Canvas create karein photo processing ke liye
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                let scale = 1;
                let encoderOptions = 1.0; // Quality factor (0.0 to 1.0)

                // Quality ke mutabik resolution aur compression set karein
                if (quality === 'medium') {
                    scale = 0.7;        // 70% Resolution
                    encoderOptions = 0.7; // 70% Image Quality
                } else if (quality === 'low') {
                    scale = 0.4;        // 40% Resolution
                    encoderOptions = 0.3; // 30% Image Quality
                }

                // Canvas dimensions set karein
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;

                // Image ko canvas par draw karein
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // Download link create karein
                const link = document.createElement('a');
                link.download = `wallpaper-${quality}.jpg`;
                
                // Canvas ko image data me convert karein selected quality ke sath
                link.href = canvas.toDataURL('image/jpeg', encoderOptions);
                
                // Auto click karke gallery/downloads me save karwayein
                link.click();
            };
        }
    </script>
</body>
</html>
