<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Player - Premium Gallery</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f12;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1. Intro Animation / Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1s ease-in-out forwards;
            animation-delay: 2.5s; /* 2.5 seconds baad fade out */
        }

        .splash-logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f2fe, #ff0844);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: scaleUp 1.5s ease-in-out infinite alternate;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 5px rgba(0,242,254,0.3)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(255,8,68,0.8)); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* 2. Fighter Player Animated Header */
        header {
            padding: 20px 5%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }

        .header-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            
            /* Animated Gradient Text */
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe, #ff0844, #ffb199);
            background-size: 300% auto;
            color: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            /* Glow Effect */
            filter: drop-shadow(0px 0px 10px rgba(79, 172, 254, 0.5));
            animation: shine 4s linear infinite, pulse 2s ease-in-out infinite alternate;
        }

        @keyframes shine {
            to { background-position: 300% center; }
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0px 0px 10px rgba(79, 172, 254, 0.5)); }
            100% { transform: scale(1.02); filter: drop-shadow(0px 0px 20px rgba(255, 8, 68, 0.8)); }
        }

        /* 3. Upload Section */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .storage-info {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .upload-section {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .upload-btn {
            background: linear-gradient(45deg, #ff0844, #ffb199);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 8, 68, 0.6);
        }

        #fileInput {
            display: none; /* Hide default input */
        }

        /* 4. Gallery Grid & Cards */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #252533;
        }

        .card-body {
            padding: 15px;
        }

        .card-body h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #4facfe;
        }

        /* Download & Delete Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .quality-select {
            flex: 1;
            background: #252533;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            min-width: 120px;
        }

        .btn-download {
            background: #4facfe;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.8;
        }

        .btn-delete {
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%; /* Make delete button full width below */
            margin-top: 5px;
        }

        .btn-delete:hover {
            background: red;
        }

        .no-wallpaper {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">FIGHTER PLAYER</div>
    </div>

    <header>
        <h1 class="header-title">Fighter Player</h1>
    </header>

    <div class="container">
        <p class="storage-info">
            Yeh gallery <b>IndexedDB</b> use karti hai. <br>
            Aap isme GBs tak multiple photos upload kar sakte hain, aur browser band karne ke baad bhi photos safe rahengi!
        </p>

        <div class="upload-section">
            <button class="upload-btn" id="uploadBtn">📤 Upload Photos (Multiple)</button>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="gallery" id="gallery">
            <div class="no-wallpaper" id="noWallpaperText">Loading your awesome gallery...</div>
        </div>
    </div>

    <script>
        const dbName = "FighterPlayerMasterDB";
        let db;

        // ----------------------------------------------------
        // 1. DATABASE SETUP (IndexedDB for Large Storage)
        // ----------------------------------------------------
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("photos")) {
                db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadPhotos(); // Page load par photos dikhayein
        };

        request.onerror = function(event) {
            console.error("Database error: ", event.target.errorCode);
            alert("Storage access me problem aayi. Private mode me use na karein.");
        };

        // ----------------------------------------------------
        // 2. UPLOAD LOGIC
        // ----------------------------------------------------
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                savePhotosToDB(files);
            }
        });

        function savePhotosToDB(files) {
            const transaction = db.transaction(["photos"], "readwrite");
            const store = transaction.objectStore("photos");

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                store.add({ fileBlob: file, name: file.name });
            }

            transaction.oncomplete = function() {
                loadPhotos(); 
                document.getElementById('fileInput').value = ""; // Input clear
            };

            transaction.onerror = function() {
                alert("Photo save karne me error aayi! Storage full ho sakti hai.");
            };
        }

        // ----------------------------------------------------
        // 3. LOAD & DISPLAY PHOTOS (WITH CONTROLS)
        // ----------------------------------------------------
        function loadPhotos() {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = ""; // Clear gallery first

            const transaction = db.transaction(["photos"], "readonly");
            const store = transaction.objectStore("photos");
            const request = store.openCursor();

            let hasPhotos = false;

            request.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    hasPhotos = true;
                    const id = cursor.value.id;
                    const fileBlob = cursor.value.fileBlob;
                    const name = cursor.value.name;
                    
                    const imgUrl = URL.createObjectURL(fileBlob);

                    // Create Card
                    const card = document.createElement("div");
                    card.className = "photo-card";
                    
                    // Card HTML Structure
                    card.innerHTML = `
                        <img src="${imgUrl}" id="img-${id}" alt="${name}">
                        <div class="card-body">
                            <h3>Wallpaper #${id}</h3>
                            <div class="controls">
                                <select class="quality-select" id="quality-${id}">
                                    <option value="high">High (Original)</option>
                                    <option value="medium">Medium (Optimized)</option>
                                    <option value="low">Low (Data Saver)</option>
                                </select>
                                <button class="btn-download" onclick="triggerDownload(${id})">Download</button>
                            </div>
                            <button class="btn-delete" onclick="deletePhoto(${id})">Delete Photo</button>
                        </div>
                    `;

                    gallery.appendChild(card);
                    cursor.continue(); // Next photo
                } else {
                    if (!hasPhotos) {
                        gallery.innerHTML = `<div class="no-wallpaper">Koi photo upload nahi ki gayi hai. Abhi upload karein!</div>`;
                    }
                }
            };
        }

        // ----------------------------------------------------
        // 4. DELETE LOGIC
        // ----------------------------------------------------
        function deletePhoto(id) {
            if(confirm("Kya aap sach me ye photo delete karna chahte hain?")) {
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                store.delete(id);

                transaction.oncomplete = function() {
                    loadPhotos(); // Refresh after delete
                };
            }
        }

        // ----------------------------------------------------
        // 5. CANVAS MULTI-QUALITY DOWNLOAD LOGIC
        // ----------------------------------------------------
        function triggerDownload(id) {
            const imgElement = document.getElementById(`img-${id}`);
            const quality = document.getElementById(`quality-${id}`).value;

            if (!imgElement) return;

            const img = new Image();
            img.src = imgElement.src; // Blob URL load kar rahe hain

            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                let scale = 1;
                let encoderOptions = 1.0; 

                if (quality === 'medium') {
                    scale = 0.7;        
                    encoderOptions = 0.7; 
                } else if (quality === 'low') {
                    scale = 0.4;        
                    encoderOptions = 0.3; 
                }

                canvas.width = img.width * scale;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                const link = document.createElement('a');
                link.download = `FighterPlayer-${quality}-${id}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', encoderOptions);
                link.click(); // Auto-save to gallery/downloads
            };
        }
    </script>
</body>
</html>
