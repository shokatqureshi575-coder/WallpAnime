<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtakuFrame — Anime Wallpapers</title>
<style>
  :root{
    --bg:#0b0d14;
    --bg-soft:#121521;
    --panel:#161a28;
    --line:#252a3d;
    --text:#e8eaf2;
    --muted:#8a90a8;
    --accent:#7c5cff;
    --accent2:#00e5c7;
    --danger:#ff5470;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(124,92,255,0.18), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(0,229,199,0.12), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    min-height:100vh;
    line-height:1.5;
  }

  /* ===== Header ===== */
  header{
    position:sticky; top:0; z-index:50;
    backdrop-filter:blur(10px);
    background:rgba(11,13,20,0.75);
    border-bottom:1px solid var(--line);
    padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  .logo{
    font-size:1.3rem; font-weight:800; letter-spacing:0.5px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .logo span{color:var(--text); -webkit-text-fill-color:var(--text);}
  .upload-btn{
    background:linear-gradient(135deg,var(--accent),#5b3fe0);
    color:#fff; border:none; padding:10px 18px; border-radius:999px;
    font-weight:600; font-size:0.9rem; cursor:pointer;
    display:flex; align-items:center; gap:8px;
    box-shadow:0 4px 18px rgba(124,92,255,0.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .upload-btn:hover{transform:translateY(-1px); box-shadow:0 6px 22px rgba(124,92,255,0.5);}
  .upload-btn:active{transform:translateY(0);}
  #fileInput{display:none;}

  /* ===== Hero ===== */
  .hero{
    text-align:center;
    padding:48px 20px 28px;
  }
  .hero h1{
    font-size:clamp(1.6rem, 5vw, 2.6rem);
    font-weight:800;
    letter-spacing:0.5px;
  }
  .hero p{
    color:var(--muted);
    margin-top:8px;
    font-size:0.95rem;
  }

  /* ===== Gallery ===== */
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:16px;
    padding:0 20px 60px;
    max-width:1200px;
    margin:0 auto;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .2s ease, border-color .2s ease;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--accent);}
  .thumb-wrap{
    position:relative;
    aspect-ratio:9/16;
    background:var(--bg-soft);
    overflow:hidden;
  }
  .thumb-wrap img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .badge{
    position:absolute; top:8px; left:8px;
    background:rgba(0,0,0,0.55);
    color:var(--accent2);
    font-size:0.7rem; font-weight:700;
    padding:3px 8px; border-radius:6px;
    letter-spacing:0.5px;
  }
  .delete-btn{
    position:absolute; top:8px; right:8px;
    background:rgba(0,0,0,0.55);
    color:var(--danger);
    border:none; width:28px; height:28px; border-radius:50%;
    font-size:0.9rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s ease, background .15s ease;
  }
  .card:hover .delete-btn{opacity:1;}
  .delete-btn:hover{background:rgba(255,84,112,0.25);}

  .card-actions{
    display:flex; gap:6px; padding:10px;
  }
  .dl-btn{
    flex:1;
    background:var(--bg-soft);
    border:1px solid var(--line);
    color:var(--text);
    font-size:0.78rem; font-weight:600;
    padding:8px 6px; border-radius:8px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .dl-btn:hover{background:var(--accent); border-color:var(--accent); color:#fff;}

  /* ===== Empty state ===== */
  .empty{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    grid-column:1/-1;
  }
  .empty .icon{font-size:2.4rem; margin-bottom:10px;}

  /* ===== Toast ===== */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--panel); border:1px solid var(--line);
    color:var(--text); padding:12px 20px; border-radius:10px;
    font-size:0.9rem; opacity:0; transition:opacity .25s ease, transform .25s ease;
    z-index:200; pointer-events:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ===== Footer ===== */
  footer{
    text-align:center; color:var(--muted); font-size:0.8rem;
    padding:24px 20px; border-top:1px solid var(--line);
  }

  @media (max-width:480px){
    .gallery{grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px; padding:0 12px 50px;}
    .hero{padding:32px 16px 20px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>Otaku</span>Frame</div>
  <label class="upload-btn" for="fileInput">
    ⬆ Upload Wallpaper
  </label>
  <input type="file" id="fileInput" accept="image/*" multiple>
</header>

<section class="hero">
  <h1>Anime Wallpapers, HD &amp; 4K</h1>
  <p>Upload anime wallpapers from your gallery — they stay here for everyone, on any device.</p>
</section>

<div class="gallery" id="gallery">
  <div class="empty" id="emptyState">
    <div class="icon">🖼️</div>
    No wallpapers yet. Tap "Upload Wallpaper" to add the first one.
  </div>
</div>

<footer>OtakuFrame — shared community wallpaper wall</footer>

<div class="toast" id="toast"></div>

<script>
const gallery = document.getElementById('gallery');
const emptyState = document.getElementById('emptyState');
const fileInput = document.getElementById('fileInput');
const toast = document.getElementById('toast');

const STORAGE_KEY = 'wallpapers-index';

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2200);
}

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Get image natural resolution
function getImageRes(dataUrl){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>resolve({w:img.naturalWidth,h:img.naturalHeight});
    img.src = dataUrl;
  });
}

function resLabel(w,h){
  const longSide = Math.max(w,h);
  if(longSide >= 3000) return '4K';
  if(longSide >= 1700) return '1080p';
  return 'HD';
}

function makeCard(item){
  const card = document.createElement('div');
  card.className = 'card';

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'thumb-wrap';

  const img = document.createElement('img');
  img.src = item.data;
  img.alt = 'Anime wallpaper';
  img.loading = 'lazy';

  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = item.label;

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.innerHTML = '✕';
  delBtn.title = 'Remove';
  delBtn.onclick = ()=>removeWallpaper(item.id, card);

  thumbWrap.appendChild(img);
  thumbWrap.appendChild(badge);
  thumbWrap.appendChild(delBtn);

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const dlBtn = document.createElement('button');
  dlBtn.className = 'dl-btn';
  dlBtn.textContent = `Download (${item.label})`;
  dlBtn.onclick = ()=>downloadWallpaper(item);

  actions.appendChild(dlBtn);

  card.appendChild(thumbWrap);
  card.appendChild(actions);

  return card;
}

function downloadWallpaper(item){
  const a = document.createElement('a');
  a.href = item.data;
  a.download = `anime-wallpaper-${item.id}.jpg`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function loadGallery(){
  let ids = [];
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    ids = JSON.parse(res.value);
  }catch(e){
    ids = [];
  }

  if(!ids.length){
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  for(const id of ids){
    try{
      const res = await window.storage.get('wallpaper:'+id, true);
      const item = JSON.parse(res.value);
      gallery.appendChild(makeCard(item));
    }catch(e){
      // skip missing
    }
  }
}

async function getIndex(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    return JSON.parse(res.value);
  }catch(e){
    return [];
  }
}

async function saveIndex(ids){
  await window.storage.set(STORAGE_KEY, JSON.stringify(ids), true);
}

async function removeWallpaper(id, cardEl){
  try{
    await window.storage.delete('wallpaper:'+id, true);
    const ids = await getIndex();
    const updated = ids.filter(x=>x!==id);
    await saveIndex(updated);
    cardEl.remove();
    if(!updated.length) emptyState.style.display = 'block';
    showToast('Wallpaper removed');
  }catch(e){
    showToast('Could not remove wallpaper');
  }
}

fileInput.addEventListener('change', async (e)=>{
  const files = Array.from(e.target.files);
  if(!files.length) return;

  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    try{
      const dataUrl = await fileToDataURL(file);
      const {w,h} = await getImageRes(dataUrl);
      const label = resLabel(w,h);
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2,7);
      const item = {id, data:dataUrl, label, w, h};

      await window.storage.set('wallpaper:'+id, JSON.stringify(item), true);
      const ids = await getIndex();
      ids.unshift(id);
      await saveIndex(ids);

      emptyState.style.display = 'none';
      gallery.insertBefore(makeCard(item), gallery.firstChild);
      showToast('Wallpaper uploaded ✓');
    }catch(err){
      showToast('Upload failed — try a smaller image');
    }
  }
  fileInput.value = '';
});

loadGallery();
</script>

</body>
</html>
