<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Gallery</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background:#0f0f1a; color:#fff; min-height:100vh; }
  header {
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    padding:20px; text-align:center;
  }
  header h1 { font-size:28px; margin-bottom:10px; }
  .upload-box {
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap; padding:10px;
  }
  input[type="file"] {
    background:#fff; color:#000; padding:8px; border-radius:6px; border:none; cursor:pointer;
  }
  .upload-box button {
    background:#ff4b5c; color:#fff; border:none; padding:10px 20px;
    border-radius:6px; cursor:pointer; font-weight:bold;
  }
  .gallery {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px; padding:20px;
  }
  .card {
    background:#1c1c2e; border-radius:10px; overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
    display:flex; flex-direction:column;
  }
  .card img { width:100%; height:180px; object-fit:cover; }
  .card-body { padding:10px; display:flex; flex-direction:column; gap:8px; }
  .download-options { display:flex; gap:6px; flex-wrap:wrap; }
  .download-options button {
    flex:1; background:#2575fc; border:none; color:#fff; padding:6px 8px;
    border-radius:5px; cursor:pointer; font-size:13px;
  }
  .download-options button:hover { background:#6a11cb; }
  .delete-btn {
    background:#444; border:none; color:#ff8080; padding:6px;
    border-radius:5px; cursor:pointer; font-size:12px;
  }
  .empty-msg { text-align:center; padding:40px; color:#888; }
  .note {
    text-align:center; padding:10px; font-size:13px; color:#aaa;
  }
</style>
</head>
<body>

<header>
  <h1>🖼️ Wallpaper Gallery</h1>
  <div class="upload-box">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <button onclick="uploadWallpapers()">Upload</button>
  </div>
  <p class="note">Wallpapers is browser/device par permanently save honge (localStorage). Note: HTML file akeli hone se data alag devices ke beech share nahi hota — sirf isi device/browser par persist hota hai.</p>
</header>

<div class="gallery" id="gallery"></div>
<p class="empty-msg" id="emptyMsg">Koi wallpaper upload nahi hua. Upar se upload karein.</p>

<script>
const fileInput = document.getElementById('fileInput');
const gallery = document.getElementById('gallery');
const emptyMsg = document.getElementById('emptyMsg');

function getWallpapers() {
  return JSON.parse(localStorage.getItem('wallpapers') || '[]');
}

function saveWallpapers(arr) {
  localStorage.setItem('wallpapers', JSON.stringify(arr));
}

function uploadWallpapers() {
  const files = fileInput.files;
  if (!files.length) { alert('Pehle file select karein'); return; }

  let wallpapers = getWallpapers();
  let count = files.length;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      wallpapers.push({ name: file.name, data: e.target.result });
      saveWallpapers(wallpapers);
      count--;
      if (count === 0) renderGallery();
    };
    reader.readAsDataURL(file);
  });
}

function renderGallery() {
  const wallpapers = getWallpapers();
  gallery.innerHTML = '';
  emptyMsg.style.display = wallpapers.length ? 'none' : 'block';

  wallpapers.forEach((wp, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${wp.data}" alt="${wp.name}">
      <div class="card-body">
        <div class="download-options">
          <button onclick="downloadImage(${index}, 'original')">Original</button>
          <button onclick="downloadImage(${index}, '1080')">1080p</button>
          <button onclick="downloadImage(${index}, '4k')">4K</button>
        </div>
        <button class="delete-btn" onclick="deleteWallpaper(${index})">🗑️ Delete</button>
      </div>
    `;
    gallery.appendChild(card);
  });
}

function deleteWallpaper(index) {
  let wallpapers = getWallpapers();
  wallpapers.splice(index, 1);
  saveWallpapers(wallpapers);
  renderGallery();
}

// Resize image to target resolution and download
function downloadImage(index, type) {
  const wallpapers = getWallpapers();
  const wp = wallpapers[index];
  const img = new Image();
  img.onload = function() {
    let targetW, targetH;
    if (type === 'original') {
      targetW = img.width;
      targetH = img.height;
    } else if (type === '1080') {
      targetW = 1920; targetH = 1080;
    } else if (type === '4k') {
      targetW = 3840; targetH = 2160;
    }

    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');

    // cover-fit drawing
    const scale = Math.max(targetW / img.width, targetH / img.height);
    const newW = img.width * scale;
    const newH = img.height * scale;
    const offsetX = (targetW - newW) / 2;
    const offsetY = (targetH - newH) / 2;
    ctx.drawImage(img, offsetX, offsetY, newW, newH);

    const link = document.createElement('a');
    link.download = `${wp.name.split('.')[0]}_${type}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  img.src = wp.data;
}

renderGallery();
</script>

</body>
</html>
